<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150">
  <defs>
    <linearGradient id="potBody2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="honeyFill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="textGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Honeypot with lid -->
  <g transform="translate(70,62)">
    <!-- Pot body — rounded jar -->
    <path d="M-22,8 Q-24,6 -24,-2 L-24,-10 Q-24,-14 -20,-14 L-14,-18 Q-12,-20 -8,-20 L8,-20 Q12,-20 14,-18 L20,-14 Q24,-14 24,-10 L24,-2 Q24,6 22,8 L18,26 Q17,30 14,32 L8,36 Q0,38 -8,36 L-14,32 Q-17,30 -18,26 Z" fill="url(#potBody2)" stroke="#b45309" stroke-width="1.5"/>

    <!-- Lid — dome on top -->
    <path d="M-26,-14 Q-28,-18 -24,-22 L-20,-26 Q-16,-30 -8,-32 Q0,-34 8,-32 Q16,-30 20,-26 L24,-22 Q28,-18 26,-14 Z" fill="url(#lidGrad)" stroke="#b45309" stroke-width="1.5"/>
    <!-- Lid knob -->
    <ellipse cx="0" cy="-32" rx="6" ry="3" fill="#fcd34d" stroke="#b45309" stroke-width="1"/>
    <circle cx="0" cy="-34" r="3" fill="#fbbf24"/>

    <!-- Pot rim -->
    <ellipse cx="0" cy="-14" rx="25" ry="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>

    <!-- Honey surface inside rim -->
    <ellipse cx="0" cy="-14" rx="21" ry="4.5" fill="url(#honeyFill2)" opacity="0.8"/>

    <!-- Three hexagons on pot body -->
    <!-- Left hex -->
    <polygon points="-16,8 -12,6 -12,10 -16,12 -20,10 -20,6" fill="none" stroke="#b45309" stroke-width="1.2" opacity="0.45"/>
    <!-- Center hex — BIGGER H, same font as wordmark -->
    <polygon points="0,5 5,2.5 5,8.5 0,11 -5,8.5 -5,2.5" fill="#a78bfa" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
    <text x="0" y="9.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7" font-weight="700" fill="#fff">H</text>
    <!-- Right hex -->
    <polygon points="16,8 20,6 20,10 16,12 12,10 12,6" fill="none" stroke="#b45309" stroke-width="1.2" opacity="0.45"/>

    <!-- Honey drips -->
    <path d="M-18,-10 Q-19,2 -17,10 Q-16,14 -15,10 Q-14,0 -15,-10" fill="#fde68a" opacity="0.85"/>
    <path d="M16,-10 Q18,2 16,8 Q15,12 16,8 Q17,0 16,-10" fill="#fde68a" opacity="0.75"/>
    <ellipse cx="3" cy="40" rx="3" ry="6" fill="#fbbf24" opacity="0.8"/>
    <ellipse cx="-4" cy="38" rx="2" ry="4" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="118" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textGrad6)">Hermtica</text>

  <!-- Tagline -->
  <text x="121" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#d97706" opacity="0.7">ENTER THE HIVE</text>
</svg>
