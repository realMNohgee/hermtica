<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140">
  <defs>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="textGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="dripGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Honeypot -->
  <g transform="translate(65,62)">
    <!-- Pot body -->
    <path d="M-20,-12 Q-22,-12 -22,-6 L-16,18 Q-14,22 0,22 Q14,22 16,18 L22,-6 Q22,-12 20,-12 Z" fill="url(#potGrad)" stroke="#b45309" stroke-width="1.5"/>

    <!-- Pot rim -->
    <ellipse cx="0" cy="-12" rx="24" ry="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>

    <!-- Honey surface inside rim -->
    <ellipse cx="0" cy="-12" rx="20" ry="4" fill="#f59e0b" opacity="0.6"/>

    <!-- H on the pot -->
    <text x="0" y="7" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#fff">H</text>

    <!-- Honey drip — left -->
    <path d="M-14,-8 Q-15,-2 -12,6 Q-11,10 -10,6 Q-8,-2 -10,-8" fill="url(#dripGrad)" opacity="0.9"/>
    <!-- Honey drip — right -->
    <path d="M10,-8 Q12,-2 10,4 Q9,8 10,4 Q11,-2 11,-8" fill="url(#dripGrad)" opacity="0.8"/>
    <!-- Small drip from bottom -->
    <ellipse cx="4" cy="24" rx="2.5" ry="5" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="112" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textGrad4)">Hermtica</text>

  <!-- Tagline -->
  <text x="115" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#d97706" opacity="0.7">ENTER THE HIVE</text>
</svg>
