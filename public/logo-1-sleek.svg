<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="corpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Diamond / Cube mark -->
  <g transform="translate(60,60)">
    <polygon points="0,-28 28,0 0,28 -28,0" fill="url(#corpGrad)" rx="4"/>
    <polygon points="0,-8 8,0 0,8 -8,0" fill="#1a1a2e" opacity="0.5"/>
    <line x1="-28" y1="0" x2="-8" y2="0" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="0" x2="28" y2="0" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-28" x2="0" y2="-8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="8" x2="0" y2="28" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="110" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="url(#corpGrad)">Hermtica</text>

  <!-- Tagline -->
  <text x="112" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" letter-spacing="4" fill="#666" text-transform="uppercase">AGENT NETWORK</text>
</svg>
