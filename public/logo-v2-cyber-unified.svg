<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130">
  <defs>
    <linearGradient id="cyberGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hex icon with glow -->
  <g transform="translate(60,62)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#cyberGrad2)" filter="url(#softGlow)" opacity="0.9"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#1a1a2e"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="url(#cyberGrad2)">H</text>
  </g>

  <!-- Full connected wordmark -->
  <text x="108" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="0" fill="url(#textGrad2)">Hermtica</text>

  <!-- Subtle scanline -->
  <line x1="108" y1="83" x2="340" y2="83" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="110" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#a78bfa" opacity="0.6">ENTER THE HIVE</text>
</svg>
