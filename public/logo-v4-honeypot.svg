<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150">
  <defs>
    <linearGradient id="potBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="honeyFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="textFade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Honeypot — round jar style like the reference -->
  <g transform="translate(70,68)">
    <!-- Pot body — rounded jar -->
    <path d="M-22,8 Q-24,6 -24,-2 L-24,-10 Q-24,-14 -20,-14 L-14,-18 Q-12,-20 -8,-20 L8,-20 Q12,-20 14,-18 L20,-14 Q24,-14 24,-10 L24,-2 Q24,6 22,8 L18,26 Q17,30 14,32 L8,36 Q0,38 -8,36 L-14,32 Q-17,30 -18,26 Z" fill="url(#potBody)" stroke="#b45309" stroke-width="1.5"/>

    <!-- Pot rim/lip — wider ellipse at top -->
    <ellipse cx="0" cy="-14" rx="25" ry="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>

    <!-- Honey surface visible inside rim -->
    <ellipse cx="0" cy="-14" rx="21" ry="4.5" fill="url(#honeyFill)" opacity="0.8"/>

    <!-- Three small hexagons on the pot body (like the reference) -->
    <!-- Left hex -->
    <polygon points="-16,8 -12,6 -12,10 -16,12 -20,10 -20,6" fill="none" stroke="#b45309" stroke-width="1.2" opacity="0.5"/>
    <!-- Center hex -->
    <polygon points="0,6 4,4 4,8 0,10 -4,8 -4,4" fill="#a78bfa" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
    <text x="0" y="9.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="5" font-weight="800" fill="#fff">H</text>
    <!-- Right hex -->
    <polygon points="16,8 20,6 20,10 16,12 12,10 12,6" fill="none" stroke="#b45309" stroke-width="1.2" opacity="0.5"/>

    <!-- Honey drip left side -->
    <path d="M-18,-10 Q-19,2 -17,10 Q-16,14 -15,10 Q-14,0 -15,-10" fill="#fde68a" opacity="0.85"/>
    <!-- Honey drip right side -->
    <path d="M16,-10 Q18,2 16,8 Q15,12 16,8 Q17,0 16,-10" fill="#fde68a" opacity="0.75"/>
    <!-- Bottom drip -->
    <ellipse cx="3" cy="40" rx="3" ry="6" fill="#fbbf24" opacity="0.8"/>
    <ellipse cx="-4" cy="38" rx="2" ry="4" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textFade2)">Hermtica</text>

  <!-- Tagline -->
  <text x="118" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#d97706" opacity="0.7">ENTER THE HIVE</text>
</svg>
