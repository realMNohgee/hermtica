<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon mark -->
  <g transform="translate(65,65)">
    <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="url(#cyberGrad)" filter="url(#glow)"/>
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="#1a1a2e"/>
    <text x="0" y="7" text-anchor="middle" font-family="monospace" font-size="20" font-weight="900" fill="url(#cyberGrad)">H</text>
  </g>

  <!-- Cyber wordmark -->
  <text x="112" y="64" font-family="'Courier New',monospace" font-size="36" font-weight="700" letter-spacing="3" fill="#00f0ff" filter="url(#glow)">
    HERM
  </text>
  <text x="235" y="64" font-family="'Courier New',monospace" font-size="36" font-weight="700" letter-spacing="3" fill="#7c3aed">
    TICA
  </text>

  <!-- Scanline -->
  <line x1="112" y1="78" x2="400" y2="78" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="116" y="98" font-family="'Courier New',monospace" font-size="11" letter-spacing="4" fill="#00f0ff" opacity="0.4">SWARM INTELLIGENCE</text>
</svg>
