<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140">
  <defs>
    <!-- Color palette: honey pot gold-to-purple -->
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- 3D Hex cluster — like the reference but gold/purple palette -->
  <g transform="translate(65,62)">
    <!-- Center hex — the H hex, tallest/most prominent -->
    <g transform="translate(0,0)">
      <!-- 3D side faces -->
      <polygon points="-14,6 -14,12 0,18 0,12" fill="#b45309" opacity="0.5"/>
      <polygon points="0,12 0,18 14,12 14,6" fill="#92400e" opacity="0.4"/>
      <!-- Top face -->
      <polygon points="0,-14 14,-8 14,6 0,12 -14,6 -14,-8" fill="url(#c1)" stroke="#b45309" stroke-width="0.8"/>
      <!-- H -->
      <text x="0" y="3" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#fff">H</text>
    </g>

    <!-- Top-right hex — slightly behind -->
    <g transform="translate(18,-16)">
      <polygon points="-10,5 -10,10 0,15 0,10" fill="#d97706" opacity="0.4"/>
      <polygon points="0,10 0,15 10,10 10,5" fill="#b45309" opacity="0.35"/>
      <polygon points="0,-12 10,-6 10,5 0,10 -10,5 -10,-6" fill="url(#c2)" stroke="#d97706" stroke-width="0.6" opacity="0.8"/>
    </g>

    <!-- Bottom-right hex -->
    <g transform="translate(16,16)">
      <polygon points="-8,4 -8,8 0,12 0,8" fill="#7c3aed" opacity="0.4"/>
      <polygon points="0,8 0,12 8,8 8,4" fill="#6d28d9" opacity="0.35"/>
      <polygon points="0,-10 8,-5 8,4 0,8 -8,4 -8,-5" fill="url(#c3)" stroke="#7c3aed" stroke-width="0.6" opacity="0.75"/>
    </g>

    <!-- Bottom-left hex -->
    <g transform="translate(-16,16)">
      <polygon points="-8,4 -8,8 0,12 0,8" fill="#8b5cf6" opacity="0.35"/>
      <polygon points="0,8 0,12 8,8 8,4" fill="#7c3aed" opacity="0.3"/>
      <polygon points="0,-10 8,-5 8,4 0,8 -8,4 -8,-5" fill="url(#c4)" stroke="#a78bfa" stroke-width="0.6" opacity="0.65"/>
    </g>

    <!-- Top-left hex -->
    <g transform="translate(-18,-16)">
      <polygon points="-8,4 -8,8 0,12 0,8" fill="#c4b5fd" opacity="0.3"/>
      <polygon points="0,8 0,12 8,8 8,4" fill="#a78bfa" opacity="0.25"/>
      <polygon points="0,-10 8,-5 8,4 0,8 -8,4 -8,-5" fill="url(#c4)" stroke="#c4b5fd" stroke-width="0.5" opacity="0.55"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="115" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textGrad5)">Hermtica</text>

  <!-- Tagline -->
  <text x="118" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#d97706" opacity="0.7">ENTER THE HIVE</text>
</svg>
