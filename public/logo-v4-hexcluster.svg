<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140">
  <defs>
    <!-- Radial gradient for hex cluster — center dark, edges light -->
    <radialGradient id="hexCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="60%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </radialGradient>
    <radialGradient id="hexMid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </radialGradient>
    <radialGradient id="hexOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </radialGradient>
    <!-- Text gradient — matches hex fade -->
    <linearGradient id="textFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Asymmetric 5-hex cluster -->
  <g transform="translate(65,65)">
    <!-- Center hex — H -->
    <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5" fill="url(#hexCenter)" stroke="#6d28d9" stroke-width="0.8" opacity="0.95"/>
    <text x="0" y="4.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="800" fill="#fff">H</text>

    <!-- Top-right hex -->
    <polygon points="15,-22 28,-14.5 28,0.5 15,8 2,0.5 2,-14.5" fill="url(#hexMid)" stroke="#7c3aed" stroke-width="0.6" opacity="0.7"/>

    <!-- Bottom-right hex -->
    <polygon points="17,-4 30,3.5 30,18.5 17,26 4,18.5 4,3.5" fill="url(#hexOuter)" stroke="#a78bfa" stroke-width="0.6" opacity="0.55"/>

    <!-- Bottom-left hex -->
    <polygon points="-15,-4 -2,3.5 -2,18.5 -15,26 -28,18.5 -28,3.5" fill="url(#hexMid)" stroke="#7c3aed" stroke-width="0.6" opacity="0.65"/>

    <!-- Top-left hex -->
    <polygon points="-13,-22 0,-14.5 0,0.5 -13,8 -26,0.5 -26,-14.5" fill="url(#hexOuter)" stroke="#a78bfa" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textFade)">Hermtica</text>

  <!-- Tagline -->
  <text x="118" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#a78bfa" opacity="0.7">ENTER THE HIVE</text>
</svg>
