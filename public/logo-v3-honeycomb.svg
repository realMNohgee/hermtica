<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130">
  <defs>
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="textGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Honeycomb cluster (7 hex cells) -->
  <g transform="translate(65,62)">
    <!-- Center cell — has the H -->
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="url(#honeyGrad)" stroke="#b45309" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#fff">H</text>

    <!-- Surrounding cells — top -->
    <polygon points="0,-32 14,-24 14,-16 0,-24 -14,-16 -14,-24" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <!-- top-right -->
    <polygon points="14,-24 28,-16 28,-8 14,-16 0,-8 0,-16" fill="#f59e0b" stroke="#d97706" stroke-width="1" opacity="0.5"/>
    <!-- bottom-right -->
    <polygon points="14,-8 28,0 28,8 14,0 0,8 0,0" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <!-- bottom -->
    <polygon points="0,16 14,24 14,32 0,24 -14,32 -14,24" fill="#f59e0b" stroke="#d97706" stroke-width="1" opacity="0.5"/>
    <!-- bottom-left -->
    <polygon points="-14,8 0,16 0,24 -14,16 -28,24 -28,16" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <!-- top-left -->
    <polygon points="-14,-24 0,-16 0,-8 -14,-16 -28,-8 -28,-16" fill="#f59e0b" stroke="#d97706" stroke-width="1" opacity="0.5"/>

    <!-- Tiny honey drip -->
    <ellipse cx="8" cy="22" rx="2" ry="4" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#textGrad3)">Hermtica</text>

  <!-- Tagline -->
  <text x="118" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#d97706" opacity="0.7">ENTER THE HIVE</text>
</svg>
