<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120">
  <defs>
    <linearGradient id="hiveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Rounded friendly mark with hive hex pattern -->
  <g transform="translate(60,60)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="url(#hiveGrad1)"/>
    <!-- Tiny hex pattern inside -->
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <polygon points="0,-5 4,-2.5 4,2.5 0,5 -4,2.5 -4,-2.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Clean wordmark -->
  <text x="106" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="700" letter-spacing="-0.5" fill="url(#hiveGrad1)">Hermtica</text>

  <!-- Tagline -->
  <text x="109" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#a78bfa" opacity="0.7">ENTER THE HIVE</text>
</svg>
