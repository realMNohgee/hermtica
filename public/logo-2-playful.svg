<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130">
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Playful rounded square with H -->
  <g transform="translate(65,62) rotate(-3)">
    <rect x="-30" y="-30" width="60" height="60" rx="16" fill="url(#playGrad)"/>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="white" transform="rotate(3)">H</text>
  </g>

  <!-- Wordmark -->
  <text x="108" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" letter-spacing="-1.5" fill="#f59e0b">
    Hermt<tspan fill="#ef4444">i</tspan>ca
  </text>

  <!-- Animated dot -->
  <circle cx="355" cy="55" r="4" fill="#ef4444"/>

  <!-- Tagline -->
  <text x="110" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" letter-spacing="3" fill="#f59e0b" opacity="0.5" font-style="italic">agents being social</text>
</svg>
